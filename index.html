<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Implant Center — Sistema de Facturación</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%230D9488%22/><text x=%2216%22 y=%2222%22 font-size=%2218%22 text-anchor=%22middle%22 fill=%22white%22>D</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0369A1;
  --navy-2:#0C4A6E;
  --navy-3:#0EA5E9;
  --sky-50:#F0F9FF;
  --sky-100:#E0F2FE;
  --sky-200:#BAE6FD;
  --teal:#0D9488;
  --teal-dark:#0B7A70;
  --teal-light:#E6FBF8;
  --amber:#D9822B;
  --amber-dark:#B96A1D;
  --amber-light:#FCEEDD;
  --ink:#0E1B26;
  --slate:#5C7185;
  --slate-light:#8DA0B3;
  --bg:#F3F6F8;
  --card:#FFFFFF;
  --border:#E3E9EE;
  --danger:#D34848;
  --danger-light:#FBE9E9;
  --ok:#1E9E6B;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(14,27,38,.04), 0 8px 24px -8px rgba(14,27,38,.10);
  --font-d:'Sora',sans-serif;
  --font-b:'Inter',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-b);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:var(--teal-light);color:var(--teal-dark);}
.hidden{display:none !important;}
a{color:inherit;}

/* ---------- LOGIN ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 12% 8%, rgba(255,255,255,.55), transparent 40%),
    radial-gradient(circle at 88% 12%, rgba(13,148,136,.30), transparent 45%),
    radial-gradient(circle at 20% 92%, rgba(255,255,255,.30), transparent 40%),
    radial-gradient(circle at 90% 88%, rgba(217,130,43,.22), transparent 45%),
    linear-gradient(135deg, var(--sky-200) 0%, #7DD3FC 45%, #38BDF8 100%);
  padding:24px;
}
.login-card{
  width:100%;max-width:940px;background:var(--card);border-radius:28px;
  box-shadow:0 40px 90px -24px rgba(3,105,161,.45), 0 0 0 1px rgba(255,255,255,.5);
  display:grid;grid-template-columns:1fr 1fr;overflow:hidden;
}
.login-side{
  background:linear-gradient(160deg,var(--navy) 0%, var(--navy-3) 100%);
  color:#fff;padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;
}
.login-side::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 100% 0%, rgba(255,255,255,.16), transparent 55%);
  pointer-events:none;
}
.login-side::after{
  content:"";position:absolute;right:-60px;bottom:-60px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle, rgba(13,148,136,.55), transparent 70%);
}
.brand-mark{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.tooth-logo{width:40px;height:40px;flex:0 0 auto;}
.brand-name{font-family:var(--font-d);font-weight:700;font-size:19px;letter-spacing:.2px;}
.brand-sub{font-size:11.5px;color:var(--sky-100);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;opacity:.85;}
.login-quote{position:relative;z-index:1;font-family:var(--font-d);font-size:27px;font-weight:600;line-height:1.35;margin-top:40px;}
.login-quote span{color:var(--teal-light);}
.login-foot{position:relative;z-index:1;font-size:12.5px;color:var(--sky-100);opacity:.8;margin-top:40px;}
.login-main{padding:48px 40px;display:flex;flex-direction:column;}
.login-main h1{font-family:var(--font-d);font-size:25px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px;}
.login-main p.desc{color:var(--slate);font-size:13.5px;margin-bottom:28px;}
.role-list{display:flex;flex-direction:column;gap:12px;}
.role-card{
  display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid var(--border);
  border-radius:14px;text-align:left;transition:.18s;background:#fff;
}
.role-card:hover{border-color:var(--navy-3);box-shadow:0 10px 26px -10px rgba(3,105,161,.35);transform:translateY(-2px);}
.role-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.role-icon.adm{background:linear-gradient(160deg,var(--navy),var(--navy-3));color:#fff;}
.role-icon.caj-c{background:var(--teal-light);color:var(--teal-dark);}
.role-icon.caj-n{background:var(--amber-light);color:var(--amber-dark);}
.role-name{font-weight:600;font-size:14.5px;}
.role-desc{font-size:12.5px;color:var(--slate);margin-top:1px;}
.role-arrow{margin-left:auto;color:var(--slate-light);}
.login-note{margin-top:24px;font-size:11.5px;color:var(--slate-light);text-align:center;}

/* ---------- SHELL ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex:0 0 auto;background:var(--navy);color:#fff;display:flex;flex-direction:column;
  padding:20px 14px;position:sticky;top:0;height:100vh;
}
.sb-brand{display:flex;align-items:center;justify-content:center;padding:4px 4px 20px;}
.sb-brand-logo-frame{
  width:100%;height:108px;background:#fff;border-radius:12px;overflow:hidden;position:relative;
  box-shadow:0 0 0 1px rgba(255,255,255,.24),0 8px 20px -12px rgba(0,0,0,.38);
}
.sb-brand-logo{
  display:block;width:100%;height:auto;position:absolute;left:0;top:0;transform:translateY(-22.5%);
}
.sb-nav{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.sb-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;
  color:var(--slate-light);transition:.12s;
}
.sb-item svg{flex:0 0 auto;opacity:.85;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:var(--teal);color:#fff;}
.sb-item.active svg{opacity:1;}
.sb-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--slate-light);opacity:.6;margin:16px 12px 6px;}
.sb-spacer{flex:1;}
.sb-user{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:rgba(255,255,255,.05);margin-top:8px;
}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto;}
.sb-user-name{font-size:12.5px;font-weight:600;line-height:1.2;}
.sb-user-role{font-size:10.5px;color:var(--slate-light);}
.sb-logout{margin-top:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:10px;background:rgba(255,255,255,.06);font-size:12.5px;color:var(--slate-light);}
.sb-logout:hover{background:rgba(211,72,72,.18);color:#ff9d9d;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:66px;flex:0 0 auto;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.page-title{font-family:var(--font-d);font-weight:700;font-size:17px;}
.page-sub{font-size:11.5px;color:var(--slate);margin-top:1px;}

/* branch switcher */
.branch-switch{position:relative;}
.branch-pill{
  display:flex;align-items:center;gap:9px;background:var(--navy);color:#fff;padding:9px 14px 9px 10px;
  border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--shadow);
}
.branch-pill:hover{background:var(--navy-3);}
.branch-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.dot-all{background:linear-gradient(90deg,var(--teal),var(--amber));}
.dot-centro{background:var(--teal);}
.dot-norte{background:var(--amber);}
.branch-pill svg.chev{transition:.15s;opacity:.7;}
.branch-pill.open svg.chev{transform:rotate(180deg);}
.branch-badge-static{
  display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--border);color:var(--ink);
  padding:8px 14px 8px 10px;border-radius:999px;font-size:13px;font-weight:600;
}
.branch-menu{
  position:absolute;top:calc(100% + 10px);left:0;width:290px;background:#fff;border-radius:16px;
  box-shadow:0 20px 50px -12px rgba(14,27,38,.28);border:1px solid var(--border);overflow:hidden;z-index:50;
  animation:pop .12s ease;
}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.branch-menu-item{
  display:flex;align-items:center;gap:12px;padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--ink);
}
.branch-menu-item:hover{background:var(--bg);}
.branch-menu-item.sel{background:var(--teal-light);color:var(--teal-dark);}
.branch-menu-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.bmi-all{background:linear-gradient(135deg,var(--teal),var(--amber));color:#fff;}
.bmi-centro{background:var(--teal-light);color:var(--teal-dark);}
.bmi-norte{background:var(--amber-light);color:var(--amber-dark);}
.branch-menu-sub{font-size:11px;font-weight:400;color:var(--slate);}
.branch-menu-div{height:1px;background:var(--border);margin:2px 0;}
.branch-menu-check{margin-left:auto;color:var(--teal);}

.topbar-right{display:flex;align-items:center;gap:14px;}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--slate);}
.icon-btn:hover{background:var(--bg);}
.content{flex:1;padding:26px;max-width:1400px;width:100%;margin:0 auto;}

/* ---------- shared bits ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.kpi-label{font-size:12px;color:var(--slate);font-weight:600;display:flex;align-items:center;gap:8px;}
.kpi-value{font-family:var(--font-d);font-size:26px;font-weight:700;margin-top:8px;}
.kpi-value small{font-size:13px;font-weight:600;color:var(--slate);}
.kpi-delta{font-size:11.5px;margin-top:6px;font-weight:600;}
.kpi-delta.up{color:var(--ok);}
.kpi-delta.flat{color:var(--slate);}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.card-title{font-family:var(--font-d);font-weight:700;font-size:15px;}
.card-body{padding:18px 20px;}

.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bar-label{width:110px;font-size:12.5px;font-weight:600;color:var(--slate);flex:0 0 auto;}
.bar-track{flex:1;background:var(--bg);border-radius:8px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}
.bar-val{width:70px;text-align:right;font-family:var(--font-m);font-size:12px;font-weight:600;flex:0 0 auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--slate);font-weight:700;padding:10px 12px;border-bottom:1.5px solid var(--border);}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
.tag-centro{background:var(--teal-light);color:var(--teal-dark);}
.tag-norte{background:var(--amber-light);color:var(--amber-dark);}
.tag-efectivo{background:#EAF6EC;color:var(--ok);}
.tag-tarjeta{background:#EAF0FB;color:#3457D5;}
.tag-admin{background:var(--navy);color:#fff;}
.tag-cajero{background:var(--bg);color:var(--slate);border:1px solid var(--border);}
.mono{font-family:var(--font-m);}
.muted{color:var(--slate);}
.empty-state{padding:40px 20px;text-align:center;color:var(--slate);}
.empty-state svg{margin-bottom:10px;opacity:.5;}
.empty-state div.t{font-weight:600;color:var(--ink);font-size:13.5px;margin-bottom:3px;}
.empty-state div.s{font-size:12px;}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;transition:.12s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover{background:var(--amber-dark);}
.btn-ghost{background:var(--bg);color:var(--ink);}
.btn-ghost:hover{background:var(--border);}
.btn-outline{border:1.5px solid var(--border);color:var(--ink);}
.btn-outline:hover{border-color:var(--slate);}
.btn-danger{color:var(--danger);}
.btn-danger:hover{background:var(--danger-light);}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;background:#fff;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.pay-toggle{display:flex;gap:10px;}
.pay-opt{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;font-size:13px;}
.pay-opt.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
.pay-opt svg{opacity:.85;}

.search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;background:#fff;}
.search-box input{border:none;flex:1;font-size:13px;}
.search-box input:focus{outline:none;}

/* invoice module */
.svc-list{max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:6px;}
.svc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:10px;}
.svc-item:hover{border-color:var(--teal);}
.svc-name{font-size:13px;font-weight:600;}
.svc-price{font-family:var(--font-m);font-size:12.5px;color:var(--slate);}
.cart-line{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
.cart-line:last-child{border-bottom:none;}
.cart-qty{display:flex;align-items:center;gap:6px;}
.qty-btn{width:22px;height:22px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-btn:hover{background:var(--border);}
.cart-total-row{display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1.5px dashed var(--border);font-family:var(--font-d);font-weight:700;font-size:16px;}

/* POS grid */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.pos-prod-wrap{position:relative;min-width:0;}
.pos-prod{
  width:100%;height:100%;min-height:138px;background:#fff;border:1.5px solid var(--border);border-radius:14px;
  padding:14px 12px;text-align:left;display:flex;flex-direction:column;gap:6px;transition:.12s;
}
.pos-prod:hover{border-color:var(--amber);transform:translateY(-2px);box-shadow:0 8px 20px -10px rgba(217,130,43,.4);}
.pos-prod:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none;border-color:var(--border);}
.pos-prod .pi{width:36px;height:36px;border-radius:9px;background:var(--amber-light);color:var(--amber-dark);display:flex;align-items:center;justify-content:center;}
.pos-prod .pn{font-size:12.5px;font-weight:700;line-height:1.25;}
.pos-prod .pp{font-family:var(--font-m);font-size:12px;color:var(--slate);}
.pos-prod-status{margin-top:auto;align-self:flex-start;}
.pos-prod-actions{position:absolute;top:8px;right:8px;z-index:2;display:flex;gap:4px;}
.pos-prod-action{
  width:26px;height:26px;border-radius:7px;background:#fff;border:1px solid var(--border);color:var(--slate);
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px -6px rgba(14,27,38,.35);
}
.pos-prod-action:hover{border-color:var(--slate-light);color:var(--ink);}
.pos-prod-action.delete:hover{border-color:var(--danger);background:var(--danger-light);color:var(--danger);}
.pos-cat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);font-weight:700;margin:16px 0 8px;}
.pos-cat-label:first-child{margin-top:0;}

/* receipt */
.receipt{
  font-family:var(--font-m);font-size:12.5px;color:var(--ink);background:#fff;padding:22px 20px;
  position:relative;
}
.receipt::before{
  content:"";position:absolute;top:-8px;left:0;right:0;height:16px;
  background-image:radial-gradient(circle, var(--bg) 5px, transparent 5.5px);
  background-size:20px 16px;background-repeat:repeat-x;background-position:top center;
}
.receipt-head{text-align:center;margin-bottom:14px;}
.receipt-head .rb{font-family:var(--font-d);font-weight:700;font-size:15px;}
.receipt-head .rs{font-size:11px;color:var(--slate);margin-top:2px;}
.receipt-row{display:flex;justify-content:space-between;padding:4px 0;}
.receipt-div{border-top:1px dashed var(--border);margin:10px 0;}
.receipt-total{display:flex;justify-content:space-between;font-weight:700;font-size:15px;padding-top:8px;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,27,43,.55);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;backdrop-filter:blur(2px);
}
.modal{background:#fff;border-radius:20px;max-width:460px;width:100%;box-shadow:0 30px 80px -20px rgba(0,0,0,.4);max-height:90vh;overflow:auto;}
.modal.wide{max-width:600px;}
.modal-head{display:flex;align-items:center;justify-content:between;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal-title{font-family:var(--font-d);font-weight:700;font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);}

.toast{
  position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 18px;border-radius:12px;
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;box-shadow:0 20px 50px -10px rgba(0,0,0,.4);
  z-index:300;animation:toastIn .18s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.toast .ok-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}

.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.chip{padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;border:1.5px solid var(--border);color:var(--slate);}
.chip.sel{background:var(--navy);color:#fff;border-color:var(--navy);}

/* agenda */
.tag-pendiente{background:var(--amber-light);color:var(--amber-dark);}
.tag-confirmada{background:#EAF0FB;color:#3457D5;}
.tag-completada{background:#EAF6EC;color:var(--ok);}
.tag-cancelada{background:var(--danger-light);color:var(--danger);}
.day-strip{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;}
.day-chip{
  flex:0 0 auto;min-width:64px;padding:10px 8px;border-radius:14px;border:1.5px solid var(--border);background:#fff;
  text-align:center;display:flex;flex-direction:column;gap:3px;
}
.day-chip:hover{border-color:var(--teal);}

}
.radiography-brand-logo{

}

@media print{

  #printArea, #printArea *{visibility:visible;}

}
@media (max-width:980px){

  .patient-info-row{grid-template-columns:1fr;gap:3px;}

  if(!db.products){ db.products = CAFE_PRODUCTS.map(p=>normalizeCafeProduct(p)); }
  db.products = db.products.map(p=>normalizeCafeProduct(p));
  if(!db.nextProductId){ db.nextProductId = Math.max(0,...db.products.map(p=>Number(p.id)||0))+1; }
  if(!db.radiographies){ db.radiographies = RADIOGRAPHY_STUDIES.map(r=>({...r})); }
  db.radiographies = db.radiographies.map((r,idx)=>({...r,key:r.key||Date.now()+idx,notes:r.notes||''}));
  if(!db.nextRadiographyNo){ db.nextRadiographyNo = 2049; }
  if(!db.appointments){ db.appointments = []; }
  if(!db.nextApptNo){ db.nextApptNo = 208; }
  return db;
}

function saveProduct(editId){
  const name = document.getElementById('prName').value.trim();
  const cat = document.getElementById('prCat').value;
  const price = parseFloat(document.getElementById('prPrice').value);
  const iconType = document.getElementById('prIcon').value;
  const available = document.getElementById('prState').value==='available';
  if(!name){ toast('Escribe el nombre del producto'); return; }
  if(!PRODUCT_CATEGORIES.includes(cat)){ toast('Selecciona una categoría válida'); return; }
  if(isNaN(price) || price<0){ toast('Escribe un precio válido'); return; }
  const duplicate = DB.products.find(p=>p.name.toLowerCase()===name.toLowerCase() && p.id!==editId);
  if(duplicate){ toast('Ya existe un producto con ese nombre'); return; }
  if(editId){
    const product = DB.products.find(p=>p.id===editId);
    if(!product){ toast('No se encontró el producto'); return; }
    const previousName = product.name;
    Object.assign(product,{name,cat,price,iconType,available});
    S.posCart.forEach(line=>{
      if(line.productId===editId || (!line.productId && line.name===previousName)) Object.assign(line,{productId:editId,name,price});
    });
    if(!available) S.posCart = S.posCart.filter(line=>line.productId!==editId);
  }else{
    DB.products.push({id:DB.nextProductId++,name,cat,price,iconType,available});
  }
  saveDB(); closeModal(); render();
  toast(editId?'Producto actualizado':'Producto creado');
}
function deleteProduct(id){
  const product = DB.products.find(p=>p.id===id);
  if(!product) return;
  if(!confirm(`¿Eliminar el producto "${product.name}"?`)) return;
  DB.products = DB.products.filter(p=>p.id!==id);
  S.posCart = S.posCart.filter(line=>line.productId!==id && line.name!==product.name);
  saveDB(); render(); toast('Producto eliminado');
}
function addToPosCart(prodId){
  const p = DB.products.find(x=>x.id===prodId);
  if(!p || !p.available){ toast('Este producto no está disponible'); return; }
  const existing = S.posCart.find(l=>l.productId===p.id);
  if(existing) existing.qty++;
  else S.posCart.push({productId:p.id,name:p.name,price:p.price,qty:1});
  render();
}
function changePosQty(idx,delta){ S.posCart[idx].qty+=delta; if(S.posCart[idx].qty<=0) S.posCart.splice(idx,1); render(); }
function removePosLine(idx){ S.posCart.splice(idx,1); render(); }

  const patient = document.getElementById('rxPatient').value.trim();
  const dateVal = document.getElementById('rxDate').value;
  const timeVal = document.getElementById('rxTime').value;
  const study = document.getElementById('rxStudy').value;
  const branch = document.getElementById('rxBranch').value;
  const status = document.getElementById('rxStatus').value;
  const notes = document.getElementById('rxNotes').value.trim();
  if(!id || !patient || !dateVal || !timeVal){ toast('Completa todos los campos obligatorios'); return; }
  const duplicate = DB.radiographies.find(r=>r.id.toLowerCase()===id.toLowerCase() && r.key!==editKey);
  if(duplicate){ toast('Ya existe un estudio con ese código'); return; }
  const date = new Date(dateVal+'T'+timeVal).getTime();
  if(isNaN(date)){ toast('Selecciona una fecha y hora válidas'); return; }
  if(editKey){
    const record = DB.radiographies.find(r=>r.key===editKey);
    if(!record){ toast('No se encontró el estudio'); return; }
    Object.assign(record,{id,date,patient,study,branch,status,notes});
  }else{
    DB.radiographies.push({key:Date.now(),id,date,patient,study,branch,status,notes});
    DB.nextRadiographyNo++;
  }
  saveDB(); closeModal(); render();
  toast(editKey?'Estudio actualizado':'Estudio creado');
}
function deleteRadiography(key){
  const record = DB.radiographies.find(r=>r.key===key);
  if(!record) return;
  if(!confirm(`¿Eliminar el estudio "${record.id}"?`)) return;
  DB.radiographies = DB.radiographies.filter(r=>r.key!==key);
  saveDB(); render(); toast('Estudio eliminado');
}

/* ================= CITAS Y AGENDA ================= */
function dayKey(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function toDateInputVal(ts){ const d=new Date(ts); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function toTimeInputVal(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('es-NI',{hour:'2-digit',minute:'2-digit'}); }
const WEEKDAY_SHORT = ['dom','lun','mar','mié','jue','vie','sáb'];

function renderCitas(){
  const scope = currentBranchScope();
  const selDay = S.agendaDate;
  const stripDays = [];
  for(let i=-3;i<=3;i++){
    const d = new Date(selDay); d.setDate(d.getDate()+i); d.setHours(0,0,0,0);
    const ts = d.getTime();
    const count = DB.appointments.filter(a=>scope.includes(a.branch) && dayKey(a.date)===ts && a.status!=='cancelada').length;
    stripDays.push({ts, d, count});
  }
  const dayAppts = DB.appointments.filter(a=>scope.includes(a.branch) && dayKey(a.date)===selDay).sort((a,b)=>a.date-b.date);
  const dateTitle = new Date(selDay).toLocaleDateString('es-NI',{weekday:'long', day:'2-digit', month:'long'});

  return `
  <div class="day-strip">
    ${stripDays.map(x=>`
      <button class="day-chip ${x.ts===selDay?'sel':''}" onclick="setAgendaDate(${x.ts})">
        <span class="dname">${WEEKDAY_SHORT[x.d.getDay()]}</span>
        <span class="dnum">${x.d.getDate()}</span>
        <span class="dcount">${x.count?x.count+' cita'+(x.count>1?'s':''):'—'}</span>
      </button>`).join('')}
  </div>

  <div class="agenda-nav">
    <button class="icon-btn btn-outline" style="border:1.5px solid var(--border);" onclick="changeAgendaDate(-1)">${ICONS.arrowLeft}</button>
    <div class="agenda-date-title" style="text-transform:capitalize;">${dateTitle}</div>
    <button class="btn btn-ghost btn-sm" onclick="setAgendaDate(${(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();})()})">Hoy</button>
    <button class="icon-btn btn-outline" style="border:1.5px solid var(--border);" onclick="changeAgendaDate(1)">${ICONS.arrowRight}</button>
    <span class="sb-spacer"></span>
    <button class="btn btn-primary" onclick="openAddCita()">${ICONS.plus} Nueva cita</button>
  </div>

  <div class="card">
    <div class="card-body">
      ${dayAppts.length ? dayAppts.map(a=>`
        <div class="appt-row">
          <div class="appt-time">${fmtTime(a.date)}</div>
          <div class="appt-main">
            <div class="appt-patient">${a.patient} ${branchTag(a.branch)}</div>
            <div class="appt-meta">${a.service} · ${a.dentist}${a.notes?' · '+a.notes:''}</div>
          </div>
          <span class="tag tag-${a.status}">${statusLabel(a.status)}</span>
          <div class="appt-actions">
            ${a.status==='pendiente'?`<button class="btn btn-ghost btn-sm" onclick="setApptStatus('${a.id}','confirmada')">${ICONS.check} Confirmar</button>`:''}
            ${a.status==='confirmada'?`<button class="btn btn-ghost btn-sm" onclick="setApptStatus('${a.id}','completada')">${ICONS.check} Completar</button>`:''}
            ${(a.status==='pendiente'||a.status==='confirmada')?`<button class="btn btn-ghost btn-sm btn-danger" onclick="setApptStatus('${a.id}','cancelada')">${ICONS.x} Cancelar</button>`:''}
            ${a.status==='completada'?`<button class="btn btn-ghost btn-sm" onclick="facturarFromCita('${a.id}')">${ICONS.invoice} Facturar</button>`:''}
            <button class="icon-btn btn-danger" style="width:28px;height:28px;" onclick="deleteAppt('${a.id}')">${ICONS.trash}</button>
          </div>
        </div>
      `).join('') : emptyState('Sin citas para este día','Usa "Nueva cita" para agendar un paciente')}
    </div>
  </div>
  `;
}
function statusLabel(s){ return {pendiente:'Pendiente',confirmada:'Confirmada',completada:'Completada',cancelada:'Cancelada'}[s]||s; }
function setAgendaDate(ts){ S.agendaDate=ts; render(); }
function changeAgendaDate(delta){ const d=new Date(S.agendaDate); d.setDate(d.getDate()+delta); S.agendaDate=d.getTime(); render(); }
function setApptStatus(id,status){ const a=DB.appointments.find(x=>x.id===id); if(a){ a.status=status; saveDB(); render(); toast('Cita actualizada'); } }
function deleteAppt(id){ DB.appointments = DB.appointments.filter(a=>a.id!==id); saveDB(); render(); }
function facturarFromCita(id){

function saveCita(){
  const branch = document.getElementById('caBranch').value;
  const patient = document.getElementById('caPatient').value.trim();
  const service = document.getElementById('caService').value;
  const dateVal = document.getElementById('caDate').value;
  const timeVal = document.getElementById('caTime').value;
  const dentist = document.getElementById('caDentist').value.trim() || 'Dra. Valeria Duarte';
  const notes = document.getElementById('caNotes').value.trim();
  if(!patient){ toast('Escribe el nombre del paciente'); return; }
  if(!dateVal || !timeVal){ toast('Selecciona fecha y hora'); return; }
  const ts = new Date(dateVal+'T'+timeVal).getTime();
  const id = 'C-'+(DB.nextApptNo++);
  DB.appointments.unshift({id, branch, patient, service, dentist, notes, date:ts, status:'pendiente'});
  if(!DB.patients.find(p=>p.name.toLowerCase()===patient.toLowerCase())){
    DB.patients.push({id:Date.now(), name:patient, phone:''});
  }
  saveDB(); closeModal();
  S.agendaDate = dayKey(ts);
  render();
  toast('Cita agendada correctamente');
}

function savePatient(editId){
  const name = document.getElementById('npName').value.trim();
  const phone = document.getElementById('npPhone').value.trim();
  const profile = {birthDate:document.getElementById('npBirth').value,sex:document.getElementById('npSex').value,address:document.getElementById('npAddress').value.trim(),emergencyContact:document.getElementById('npEmergency').value.trim(),allergies:document.getElementById('npAllergies').value.trim(),medicalHistory:document.getElementById('npMedical').value.trim(),currentMedications:document.getElementById('npMedications').value.trim(),diagnoses:document.getElementById('npDiagnoses').value.trim(),completedTreatments:document.getElementById('npCompleted').value.trim(),pendingTreatments:document.getElementById('npPending').value.trim(),generalNotes:document.getElementById('npNotes').value.trim()};
  if(!name){ toast('Escribe un nombre'); return; }
  const duplicate = DB.patients.find(p=>p.name.toLowerCase()===name.toLowerCase() && p.id!==editId);
  if(duplicate){ toast('Ya existe un paciente con ese nombre'); return; }
  if(editId){
    const patient = DB.patients.find(p=>p.id===editId);
    if(!patient){ toast('No se encontró el paciente'); return; }
    const previousName = patient.name;
    Object.assign(patient,{name,phone,...profile});
    DB.invoices.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    DB.appointments.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    DB.radiographies.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    if(S.invoicePatient===previousName) S.invoicePatient=name;
  }else{
    DB.patients.push(normalizePatientProfile({id:Date.now(),name,phone,...profile}));
  }
  saveDB(); closeModal(); render();
  toast(editId?'Paciente actualizado':'Paciente agregado');
}
function deletePatient(id){
  const patient = DB.patients.find(p=>p.id===id);
  if(!patient) return;
  if(!confirm(`¿Eliminar a "${patient.name}" y su historial clínico?`)) return;
  DB.patients = DB.patients.filter(p=>p.id!==id);
  DB.clinicalEntries = DB.clinicalEntries.filter(entry=>entry.patientId!==id);
  if(S.patientDetailId===id) S.patientDetailId=null;
  saveDB(); render(); toast('Paciente eliminado');
}

      <div class="field"><label>Tratamiento o procedimiento realizado</label><textarea id="ceProcedure" rows="2">${escapeAttr(entry?entry.procedure:'')}</textarea></div>
      <div class="field"><label>Medicamentos o indicaciones</label><textarea id="ceInstructions" rows="2">${escapeAttr(entry?entry.instructions:'')}</textarea></div>
      <div class="field-row"><div class="field"><label>Próxima cita</label><input id="ceNext" type="date" value="${escapeAttr(entry?entry.nextAppointment:'')}"></div><div class="field"><label>Estado del tratamiento</label><select id="ceStatus"><option value="pendiente" ${status==='pendiente'?'selected':''}>Pendiente</option><option value="en_curso" ${status==='en_curso'?'selected':''}>En tratamiento</option><option value="completado" ${status==='completado'?'selected':''}>Completado</option></select></div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveClinicalEntry(${patientId},${entry?entry.id:'null'})">${entry?'Guardar cambios':'Guardar entrada'}</button></div>
  `,true);
}
function saveClinicalEntry(patientId,editId){
  const dateVal = document.getElementById('ceDate').value;
  const dentist = document.getElementById('ceDentist').value.trim();
  const reason = document.getElementById('ceReason').value.trim();
  const symptoms = document.getElementById('ceSymptoms').value.trim();
  const diagnosis = document.getElementById('ceDiagnosis').value.trim();
  const procedure = document.getElementById('ceProcedure').value.trim();
  const instructions = document.getElementById('ceInstructions').value.trim();
  const nextAppointment = document.getElementById('ceNext').value;
  const status = document.getElementById('ceStatus').value;
  if(!dateVal || !dentist || !reason){ toast('Completa fecha, odontólogo y motivo de consulta'); return; }
  const date = new Date(dateVal+'T12:00:00').getTime();
  if(editId){
    const entry = DB.clinicalEntries.find(item=>item.id===editId);
    if(!entry){ toast('No se encontró la entrada clínica'); return; }
    Object.assign(entry,{date,dentist,reason,symptoms,diagnosis,procedure,instructions,nextAppointment,status});
  }else{
    DB.clinicalEntries.push({id:Date.now(),patientId,date,dentist,reason,symptoms,diagnosis,procedure,instructions,nextAppointment,status});
  }
  S.patientDetailId=patientId;
  saveDB(); closeModal(); render();
  toast(editId?'Entrada clínica actualizada':'Entrada clínica agregada');
}

/* ================= SERVICIOS DENTALES ================= */
function renderServicios(){
  const list = DB.services.slice().sort((a,b)=>a.name.localeCompare(b.name));
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">${ICONS.tooth2} Catálogo de servicios</div>
      <button class="btn btn-primary btn-sm" onclick="openAddServicio()">${ICONS.plus} Nuevo servicio</button>
    </div>
    ${list.length ? `<table><thead><tr><th>Servicio</th><th>Precio</th><th>Usado en facturas</th><th></th></tr></thead><tbody>
      ${list.map(s=>{
        const used = DB.invoices.reduce((a,i)=>a+i.items.filter(l=>l.name===s.name).length,0);
        return `<tr>
          <td style="font-weight:600;">${s.name}</td>
          <td class="mono" style="font-weight:700;">${fmt(s.price)}</td>
          <td class="muted">${used}</td>
          <td style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="openEditServicio(${s.id})">${ICONS.pencil} Editar</button>
            <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteServicio(${s.id})">${ICONS.trash}</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody></table>` : emptyState('Sin servicios','Crea el primer servicio dental de la clínica')}
  </div>`;
}
function openAddServicio(){
  openModal(`
    <div class="modal-head"><div class="modal-title">Nuevo servicio</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre del servicio</label><input id="svName" placeholder="Ej. Carilla dental"></div>
      <div class="field"><label>Precio</label><input id="svPrice" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveServicio()">Guardar servicio</button></div>
  `);
}
function openEditServicio(id){
  const s = DB.services.find(x=>x.id===id);
  openModal(`
    <div class="modal-head"><div class="modal-title">Editar servicio</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre del servicio</label><input id="svName" value="${s.name}"></div>
      <div class="field"><label>Precio</label><input id="svPrice" type="number" min="0" step="0.01" value="${s.price}"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveServicio(${id})">Guardar cambios</button></div>
  `);
}
function saveServicio(editId){
  const name = document.getElementById('svName').value.trim();
  const price = parseFloat(document.getElementById('svPrice').value);
  if(!name){ toast('Escribe el nombre del servicio'); return; }
  if(isNaN(price) || price<0){ toast('Escribe un precio válido'); return; }
  if(editId){
    const s = DB.services.find(x=>x.id===editId);
    s.name = name; s.price = price;
    toast('Servicio actualizado');
  }else{
    DB.services.push({id:DB.nextServiceId++, name, price});
    toast('Servicio creado');
  }
  saveDB(); closeModal(); render();
}
function deleteServicio(id){ DB.services = DB.services.filter(s=>s.id!==id); saveDB(); render(); }

/* ================= USUARIOS ================= */
function renderUsuarios(){
  const list = DB.users;
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">${ICONS.users} Usuarios del sistema</div>
      <button class="btn btn-primary btn-sm" onclick="openAddUser()">${ICONS.plus} Nuevo usuario</button>
    </div>
    <table><thead><tr><th>Nombre</th><th>Rol</th><th>Sucursal</th><th>Usuario</th><th></th></tr></thead><tbody>
      ${list.map(u=>`<tr>
        <td style="font-weight:600;">${u.name}</td>
        <td><span class="tag ${u.role==='admin'?'tag-admin':'tag-cajero'}">${u.role==='admin'?'Administrador':'Cajero(a)'}</span></td>
        <td>${u.branch?branchTag(u.branch):'<span class="muted">Ambas</span>'}</td>
        <td class="mono muted">${u.username}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})">${ICONS.pencil} Editar</button>
          ${u.id>1?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteUser(${u.id})">${ICONS.trash}</button>`:'<span class="muted" style="font-size:11.5px;align-self:center;">—</span>'}
        </td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}
function openAddUser(){
  openUserForm();
}
function openEditUser(id){
  openUserForm(id);
}
function openUserForm(editId){
  const user = editId ? DB.users.find(u=>u.id===editId) : null;
  if(editId && !user){ toast('No se encontró el usuario'); return; }
  const role = user ? user.role : 'cajero';
  const branch = user ? user.branch : BRANCHES[0].id;
  openModal(`
    <div class="modal-head"><div class="modal-title">${user?'Editar usuario':'Nuevo usuario'}</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre completo</label><input id="nuName" placeholder="Ej. Pedro Sánchez" value="${escapeAttr(user?user.name:'')}"></div>
      <div class="field"><label>Usuario</label><input id="nuUser" placeholder="pedro.sanchez" value="${escapeAttr(user?user.username:'')}"></div>
      <div class="field"><label>Rol</label>
        <select id="nuRole" onchange="document.getElementById('nuBranchWrap').style.display=this.value==='cajero'?'block':'none'">
          <option value="cajero" ${role==='cajero'?'selected':''}>Cajero(a)</option>
          <option value="admin" ${role==='admin'?'selected':''}>Administrador</option>
        </select>
      </div>
      <div class="field" id="nuBranchWrap" style="${role==='admin'?'display:none;':''}"><label>Sucursal asignada</label>
        <select id="nuBranch">${BRANCHES.map(b=>`<option value="${b.id}" ${branch===b.id?'selected':''}>${b.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveUser(${user?user.id:'null'})">${user?'Guardar cambios':'Guardar usuario'}</button></div>
  `);
}
function saveUser(editId){
  const name = document.getElementById('nuName').value.trim();
  const username = document.getElementById('nuUser').value.trim();
  const role = document.getElementById('nuRole').value;
  const branch = role==='cajero' ? document.getElementById('nuBranch').value : null;
  if(!name || !username){ toast('Completa todos los campos'); return; }
  const duplicate = DB.users.find(u=>u.username.toLowerCase()===username.toLowerCase() && u.id!==editId);
  if(duplicate){ toast('Ese nombre de usuario ya existe'); return; }
  if(editId){
    const user = DB.users.find(u=>u.id===editId);
    if(!user){ toast('No se encontró el usuario'); return; }
    Object.assign(user,{name,role,branch,username});
  }else{
    DB.users.push({id:Date.now(), name, role, branch, username});
  }
  saveDB(); closeModal(); render();
  toast(editId?'Usuario actualizado':'Usuario creado');
}
function deleteUser(id){ DB.users = DB.users.filter(u=>u.id!==id); saveDB(); render(); }

/* ================= REPORTES ================= */
function renderReportes(){
  const now = Date.now(); const day=86400000;
  const ranges = {today: now - (now % day), week: now - 7*day, month: now - 30*day, all: 0};
  const from = ranges[S.reportRange];
  const branchOk = (b)=> S.reportBranch==='all' ? true : b===S.reportBranch;

  const invF = DB.invoices.filter(i=>i.date>=from && branchOk(i.branch));
  const posF = DB.posSales.filter(s=>s.date>=from && branchOk(s.branch));

  const totalDental = invF.reduce((a,i)=>a+i.total,0);
  const totalCafe = posF.reduce((a,s)=>a+s.total,0);
  const cashDental = invF.filter(i=>i.method==='efectivo').reduce((a,i)=>a+i.total,0);
  const cardDental = invF.filter(i=>i.method==='tarjeta').reduce((a,i)=>a+i.total,0);
  const cashCafe = posF.filter(s=>s.method==='efectivo').reduce((a,s)=>a+s.total,0);
  const cardCafe = posF.filter(s=>s.method==='tarjeta').reduce((a,s)=>a+s.total,0);
  const grand = totalDental+totalCafe;

  return `
  <div class="filter-bar">
    ${[['today','Hoy'],['week','7 días'],['month','30 días'],['all','Todo']].map(([k,l])=>`
      <button class="chip ${S.reportRange===k?'sel':''}" onclick="S.reportRange='${k}';render();">${l}</button>`).join('')}
    <span style="width:1px;height:22px;background:var(--border);"></span>
    <button class="chip ${S.reportBranch==='all'?'sel':''}" onclick="S.reportBranch='all';render();">Todas las sucursales</button>
    ${BRANCHES.map(b=>`<button class="chip ${S.reportBranch===b.id?'sel':''}" onclick="S.reportBranch='${b.id}';render();">${b.name}</button>`).join('')}
    <span class="sb-spacer"></span>
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">${ICONS.download} Exportar CSV</button>
  </div>

  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Ingreso total</div><div class="kpi-value">${fmt(grand)}</div></div>
    <div class="kpi-card"><div class="kpi-label">${ICONS.invoice} Dental</div><div class="kpi-value">${fmt(totalDental)}</div><div class="kpi-delta flat">${invF.length} facturas</div></div>
    <div class="kpi-card"><div class="kpi-label">${ICONS.coffee} Cafetería</div><div class="kpi-value">${fmt(totalCafe)}</div><div class="kpi-delta flat">${posF.length} ventas</div></div>
    <div class="kpi-card"><div class="kpi-label">Transacciones</div><div class="kpi-value">${invF.length+posF.length}</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-head"><div class="card-title">Por método de pago</div></div>
      <div class="card-body">
        <div class="pos-cat-label" style="margin-top:0;">Dental</div>
        <div class="bar-row"><div class="bar-label">${ICONS.cash} Efectivo</div><div class="bar-track"><div class="bar-fill" style="width:${totalDental?cashDental/totalDental*100:0}%;background:var(--ok)"></div></div><div class="bar-val">${fmt(cashDental)}</div></div>
        <div class="bar-row"><div class="bar-label">${ICONS.card} Tarjeta</div><div class="bar-track"><div class="bar-fill" style="width:${totalDental?cardDental/totalDental*100:0}%;background:#3457D5"></div></div><div class="bar-val">${fmt(cardDental)}</div></div>
        <div class="pos-cat-label">Cafetería</div>
        <div class="bar-row"><div class="bar-label">${ICONS.cash} Efectivo</div><div class="bar-track"><div class="bar-fill" style="width:${totalCafe?cashCafe/totalCafe*100:0}%;background:var(--ok)"></div></div><div class="bar-val">${fmt(cashCafe)}</div></div>
        <div class="bar-row"><div class="bar-label">${ICONS.card} Tarjeta</div><div class="bar-track"><div class="bar-fill" style="width:${totalCafe?cardCafe/totalCafe*100:0}%;background:#3457D5"></div></div><div class="bar-val">${fmt(cardCafe)}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Servicios dentales más vendidos</div></div>
      <div class="card-body">
        ${topItems(invF).map(([name,val],idx)=>`
          <div class="bar-row"><div class="bar-label" style="width:150px;">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${val.pct}%;background:var(--teal)"></div></div><div class="bar-val">${fmt(val.total)}</div></div>
        `).join('') || emptyState('Sin datos','No hay facturas en este rango')}
      </div>
    </div>
  </div>
  `;
}
function topItems(invoices){
  const map = {};
  invoices.forEach(i=>i.items.forEach(l=>{
    map[l.name] = (map[l.name]||0) + l.price*l.qty;
  }));
  const arr = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max = Math.max(1,...arr.map(a=>a[1]));
  return arr.map(([name,total])=>[name,{total,pct: total/max*100}]);
}
function exportCSV(){
  let rows = [['Tipo','Folio','Fecha','Sucursal','Referencia','Método','Total']];
  DB.invoices.forEach(i=>rows.push(['Dental',i.id,new Date(i.date).toLocaleString('es-NI'),branchName(i.branch),i.patient,i.method,i.total.toFixed(2)]));
  DB.posSales.forEach(s=>rows.push(['Cafetería',s.id,new Date(s.date).toLocaleString('es-NI'),branchName(s.branch),s.cashier,s.method,s.total.toFixed(2)]));
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='dic_reporte.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Reporte exportado');
}

/* ---------- INIT ---------- */
render();
</script>
</body>
</html>
